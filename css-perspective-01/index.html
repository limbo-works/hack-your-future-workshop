<!DOCTYPE html>
<html>
  <head>
    <title>Css Perspective 01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../overall.js" defer></script>
    <link rel="stylesheet" href="../overall.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header id="navigation-header"></header>

    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
        <div
            class="flex gap-[64px]"
        >
            <div class="target"></div>
            <div class="target"></div>
            <div class="target"></div>
            <div id="interactive" class="target"></div>
        </div>

        <style
                contenteditable="plaintext-only"
                class="mt-2 w-full whitespace-pre overflow-auto"
            >#interactive {
    /* rotate3d(x, y, z, a) */
    transform: perspective(350px) rotate3d(0.5, 1, 0, 45deg);
}</style>
    </div>
  </body>
</html>

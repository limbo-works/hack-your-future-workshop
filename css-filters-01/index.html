<!DOCTYPE html>
<html>
  <head>
    <title>Css Filters 01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../overall.js" defer></script>
    <link rel="stylesheet" href="../overall.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>

    <!--
        Important notes!
        - CSS filters can be chained together and the order of the filters matters!
        - CSS filters can be animated and transitioned!
        - An element with a filter can be wrapped by another element with a different filter to create more complex effects!
        - Same filters can be applied with backdrop-filter to affect the background of an element instead of the element itself!
    -->

  <body>
    <header id="navigation-header"></header>

    <div class="my-24 flex gap-x-[12px] items-start">
        <div
            class="sticky top-0 grid grid-cols-4 gap-x-[12px] gap-y-[24px] p-[12px] w-[65vw]"
        >
            <div id="target-1" class="target">
                <p class="text-center">blur</p>
                <div id="blur" class="inner"></div>
            </div>
            <div id="target-2" class="target">
                <p class="text-center">contrast</p>
                <div id="contrast" class="inner"></div>
            </div>
            <div id="target-3" class="target">
                <p class="text-center">grayscale</p>
                <div id="grayscale" class="inner"></div>
            </div>
            <div id="target-4" class="target">
                <p class="text-center">invert</p>
                <div id="invert" class="inner"></div>
            </div>
            <div id="target-5" class="target">
                <p class="text-center">drop-shadow</p>
                <div id="drop-shadow" class="inner"></div>
            </div>
            <div id="target-6" class="target">
                <p class="text-center">sepia</p>
                <div id="sepia" class="inner"></div>
            </div>
            <div id="target-7" class="target">
                <p class="text-center">saturate</p>
                <div id="saturate" class="inner"></div>
            </div>
            <div id="target-8" class="target">
                <p class="text-center">hue-rotate</p>
                <div id="hue-rotate" class="inner"></div>
            </div>
        </div>

        <!-- Target this to apply a backdrop filter! -->
        <div id="overlay" class="fixed inset-0 pointer-events-none"></div>

        <!-- Editor -->
        <div class="w-[calc(100%-65vw-12px)] col-span-full">
            <p class="mb-2">CSS</p>
            <style
                contenteditable="plaintext-only"
                class="w-full whitespace-pre overflow-x-auto"
            >#blur {
    filter: blur(3px);
}

#contrast {
    filter: contrast(200%);
}

#grayscale {
    filter: grayscale(100%);
}

#invert {
    filter: invert(100%);
}

#drop-shadow {
    /* parameters include: x, y blur solidity, color */
    filter: drop-shadow(-8px 8px 4px var(--color-beige));
}

#sepia {
    filter: sepia(100%);
}

#saturate {
    filter: saturate(200%);
}

#hue-rotate {
    filter: hue-rotate(0.25turn);
}

#overlay {
    /* backdrop-filter: blur(6px) brightness(0.8); */
}</style>
        </div>
    </div>
  </body>
</html>

<!doctype html>
<html>
    <head>
        <title>CSS Trigonometry 02 - Circular Layout</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="../overall.js" defer></script>
        <link rel="stylesheet" href="../overall.css" />
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <header id="navigation-header"></header>

        <main class="trig-main">
            <section class="trig-intro">
                <h1>Circular Layouts</h1>
                <p>
                    Combining <code>cos()</code> and <code>sin()</code> allows us to place elements 
                    along a perfect circle using only CSS.
                </p>
            </section>

            <section class="trig-demo">
                <h2>12-Point Distribution</h2>
                <p>
                    Hover over the circle to see the points "pop out" from the center.
                </p>

                <div class="trig-clock" style="--total: 12; --radius: 140px">
                    <div class="trig-clock__hint">HOVER</div>
                    <div class="trig-clock__dot" style="--i: 1">1</div>
                    <div class="trig-clock__dot" style="--i: 2">2</div>
                    <div class="trig-clock__dot" style="--i: 3">3</div>
                    <div class="trig-clock__dot" style="--i: 4">4</div>
                    <div class="trig-clock__dot" style="--i: 5">5</div>
                    <div class="trig-clock__dot" style="--i: 6">6</div>
                    <div class="trig-clock__dot" style="--i: 7">7</div>
                    <div class="trig-clock__dot" style="--i: 8">8</div>
                    <div class="trig-clock__dot" style="--i: 9">9</div>
                    <div class="trig-clock__dot" style="--i: 10">10</div>
                    <div class="trig-clock__dot" style="--i: 11">11</div>
                    <div class="trig-clock__dot" style="--i: 12">12</div>
                </div>

                <style contenteditable class="trig-editable-style">
.trig-clock__dot {
  /* Calculate the position for each dot */
  --angle: calc(var(--i) * (360deg / var(--total)) - 90deg);

  translate: 
    calc(cos(var(--angle)) * var(--current-radius)) 
    calc(sin(var(--angle)) * var(--current-radius));
}</style>
            </section>
        </main>
    </body>
</html>
